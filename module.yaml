    title: "Technical Content Writer"
    icon: "📑"
    description: "Technical Content Writer who produces whitepapers, solution briefs, technical guides, and reference-architecture explainers for B2B technology buyers (technical buyer / champion / developer-end-user)."

  # v2 — Field Marketing
  - code: field-marketing-orchestrator
    name: "Frank Field"
    title: "Field Marketing Lead"
    icon: "🎪"
    description: "Field Marketing Lead who owns ABM, events & webinars, customer advocacy, and social-media coordination (via Nova). Delegates via the brief-driven protocol."
  - code: abm-strategist
