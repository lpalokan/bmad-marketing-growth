code: marketing-growth
name: "Marketing Growth Suite"
description: "AI-powered marketing team for international B2B technology — CMO + 8 domain orchestrators + ~33 specialists, with brief-driven delegation (see docs/protocol.md). v2.0.0 — Phase 6 (Tier-1 workflows) complete. Tier-2 workflows deferred to a separate epic."
module_version: 2.0.0
default_selected: false

module_greeting: |
  Your AI marketing team is ready.

  **First run?** Start with /company-context-bootstrap to fill the
  shared company-context/ files (ICP, positioning, brand voice, KPIs,
  tech stack) — every v2 agent reads these on activation.

  Then talk to Max Growth (CMO) via /marketing-orchestrator, or jump
  directly to a domain orchestrator or specialist below.

  Bootstrap: company-context-bootstrap
  CMO: marketing-orchestrator (Max Growth)
  Measurement & Attribution Staff: growth-analyst (Pixel Metrics)

  Domain orchestrators:
    product-marketing-orchestrator (Priya Position)
    digital-marketing-orchestrator (Dani Demand)
    growth-marketing-orchestrator (Greta Growth)
    brand-orchestrator (Brio Brand)
    content-architect (Milo Page)
    field-marketing-orchestrator (Frank Field)
    pr-comms-orchestrator (Penny PR)
    channel-partner-orchestrator (Charlie Channel)

  Specialists (by domain):
    PMM: positioning-messaging-pmm, competitive-intelligence-pmm, launch-sales-enablement-pmm
    Digital: web-cro-specialist, paid-search-specialist, paid-social-demand-specialist, marketing-automation-engineer, technical-seo-engineer
    Growth: lifecycle-activation, experimentation-funnel-lead
    Brand: brand-narrative-strategist, localization-international-lead
    Content: content-seo-strategist, technical-content-writer
    Field: abm-strategist, events-webinars-producer, customer-advocacy-references, social-media-strategist (Nova), linkedin-creator, youtube-strategist
    PR & Comms: media-relations-specialist, analyst-relations-specialist
    Channel: partner-marketplace-manager

  Workflows (Tier-1, v2): annual-planning, product-launch, content-pipeline (refreshed), paid-campaign-launch, experimentation-sprint, abm-program, growth-audit (refreshed)
  Workflows (Tier-2 / kept from v1, deferred for v2 refresh): marketing-strategy, seo-sprint
  Bootstrap: company-context-bootstrap

# Install-time questions. Answers flow into _bmad/config.yaml (shared) or
# _bmad/config.user.yaml (personal, gitignored) per `user_setting`.
questions:
  - key: user_name
    prompt: "What name should the agents use when addressing you?"
    default: "BMad"
    user_setting: true

  - key: communication_language
    prompt: "What language do you want agents to communicate with you in?"
    default: "English"
    user_setting: true

  - key: document_output_language
    prompt: "What language should generated documents be written in?"
    default: "English"
    user_setting: false

  - key: output_folder
    prompt: "Where should generated documents be written?"
    default: "{project-root}/_bmad-output"
    user_setting: false
    directories:
      - "{output_folder}"

# Agent roster — consumed by bmad-module-builder validation and any UI that
# lists installed agents. Derived from each agent's customize.toml [agent] block.
agents:
  # CMO + Staff
  - code: marketing-orchestrator
    name: "Max Growth"
    title: "CMO Orchestrator"
    icon: "🎯"
    description: "CMO Orchestrator who sets global strategy, sequences campaigns across the 8 domain orchestrators, owns the annual plan, and is the explicit escalation path for ESCALATED briefs."
  - code: growth-analyst
    name: "Pixel Metrics"
    title: "Measurement & Attribution Staff"
    icon: "📊"
    description: "Measurement & Attribution Staff who owns kpis.md, designs attribution models, forecasts, dashboards, and scoring-model design. MarOps implementation moved out to Marketing Automation Engineer in v2."

  # v2 — Product Marketing
  - code: product-marketing-orchestrator
    name: "Priya Position"
    title: "Product Marketing Lead"
    icon: "📐"
    description: "Product Marketing Lead who owns ICP, positioning, messaging, competitive intelligence, and launch narrative. Delegates to PMM specialists via the brief-driven protocol."
  - code: positioning-messaging-pmm
    name: "Mona Message"
    title: "Positioning & Messaging PMM"
    icon: "💬"
    description: "Positioning & Messaging PMM who turns positioning into pillars, value props, and copy decks. Operates inside the brief-driven protocol — never self-approves."
  - code: competitive-intelligence-pmm
    name: "Connor Compete"
    title: "Competitive Intelligence PMM"
    icon: "🕵️"
    description: "Competitive Intelligence PMM who builds teardowns, battle cards, and win/loss pattern analyses for B2B technology competitors. Operates inside the brief-driven protocol."
  - code: launch-sales-enablement-pmm
    name: "Lana Launch"
    title: "Launch & Sales Enablement PMM"
    icon: "🚀"
    description: "Launch & Sales Enablement PMM who owns launch narrative and sales bundles (battlecard, one-pager, demo, FAQ). Replaces v1's Luna Blast, recast for B2B technology launches."

  # v2 — Digital Marketing
  - code: digital-marketing-orchestrator
    name: "Dani Demand"
    title: "Digital Marketing Lead"
    icon: "🌐"
    description: "Digital Marketing Lead who owns web/CRO, paid search, paid social & demand, marketing automation, and technical SEO. Delegates via the brief-driven protocol."
  - code: web-cro-specialist
    name: "Wes Web"
    title: "Web & CRO Specialist"
    icon: "📈"
    description: "Web & CRO Specialist who plans landing pages, designs A/B tests with statistically-honest sample sizes, and keeps conversion paths WCAG-compliant. Operates inside the brief-driven protocol."
  - code: paid-search-specialist
    name: "Sean SEM"
    title: "Paid Search Specialist"
    icon: "🔎"
    description: "Paid Search Specialist (Google Ads, Bing Ads, Performance Max) who owns keyword tiering, ad variants, bid strategy, and conversion-tracking hygiene. Operates inside the brief-driven protocol."
  - code: paid-social-demand-specialist
    name: "Posy Paid"
    title: "Paid Social & Demand-Gen Specialist"
    icon: "📣"
    description: "Paid Social & Demand-Gen Specialist who owns LinkedIn Ads, Meta Ads, Google Demand Gen, and YouTube Ads. Audiences, creative briefs, attribution models, brand-safety. Operates inside the brief-driven protocol."
  - code: marketing-automation-engineer
    name: "Mark Auto"
    title: "Marketing Automation Engineer"
    icon: "🔧"
    description: "Marketing Automation Engineer who specs MAP workflows (HubSpot/Marketo/Pardot), lead-routing tables, scoring models, and MAP↔CRM integration. Owns tech-stack.md. Operates inside the brief-driven protocol."
  - code: technical-seo-engineer
    name: "Tek Crawl"
    title: "Technical SEO Engineer"
    icon: "⚙️"
    description: "Technical SEO Engineer who owns indexation, schema, Core Web Vitals, hreflang, JS rendering, and internal linking infrastructure. Distinct from Content SEO. Operates inside the brief-driven protocol."

  # v2 — Growth Marketing
  - code: growth-marketing-orchestrator
    name: "Greta Growth"
    title: "Growth Marketing Lead"
    icon: "🔄"
    description: "Growth Marketing Lead who owns lifecycle/activation, experimentation, and funnel diagnostics. Delegates via the brief-driven protocol."
  - code: lifecycle-activation
    name: "Ember Flow"
    title: "Lifecycle & Activation Specialist"
    icon: "✉️"
