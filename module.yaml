code: marketing-growth
name: "Marketing Growth Suite"
description: "AI-powered marketing team for international B2B technology — being refactored to a CMO orchestrator + 8 domain orchestrators + ~33 specialists, with brief-driven delegation (see docs/protocol.md). v2.0.0 rolls out in phases; this version is Phase 0 (foundations) on top of the v1 roster."
module_version: 2.0.0
default_selected: false

module_greeting: |
  Your AI marketing team is ready.

  **First run?** Start with /company-context-bootstrap to fill the
  shared company-context/ files (ICP, positioning, brand voice, KPIs,
  tech stack) — every v2 agent reads these on activation.

  Then talk to Max Growth via /marketing-orchestrator, or jump directly
  to any agent or workflow listed below.

  Bootstrap: company-context-bootstrap
  Agents (v1 — being phased out): marketing-orchestrator, content-architect, seo-strategist, social-media-strategist, growth-analyst, linkedin-creator, twitter-ghostwriter, instagram-strategist, youtube-strategist, tiktok-creator, discord-community-manager, reddit-growth-hacker, pinterest-strategist
  Agents (v2 — Product Marketing): product-marketing-orchestrator, positioning-messaging-pmm, competitive-intelligence-pmm, launch-sales-enablement-pmm
  Agents (v2 — Digital Marketing): digital-marketing-orchestrator, web-cro-specialist, paid-search-specialist, paid-social-demand-specialist, marketing-automation-engineer, technical-seo-engineer
  Agents (v2 — Growth Marketing): growth-marketing-orchestrator, lifecycle-activation, experimentation-funnel-lead
  Workflows: marketing-strategy, content-pipeline, social-campaign, launch-sequence, growth-audit, seo-sprint, company-context-bootstrap

# Install-time questions. Answers flow into _bmad/config.yaml (shared) or
# _bmad/config.user.yaml (personal, gitignored) per `user_setting`.
questions:
  - key: user_name
    prompt: "What name should the agents use when addressing you?"
    default: "BMad"
    user_setting: true

  - key: communication_language
    prompt: "What language do you want agents to communicate with you in?"
    default: "English"
    user_setting: true

  - key: document_output_language
    prompt: "What language should generated documents be written in?"
    default: "English"
    user_setting: false

  - key: output_folder
    prompt: "Where should generated documents be written?"
    default: "{project-root}/_bmad-output"
    user_setting: false
    directories:
      - "{output_folder}"

