# Company Context Bootstrap Workflow
# Trigger: WB
# Lead: Max Growth (Marketing Orchestrator)
# Description: One-time intake → five company-context/ files.

workflow:
  id: company-context-bootstrap
  name: "Company Context Bootstrap"
  version: "1.1.0"
  trigger: "WB"
  lead_agent: marketing-orchestrator
  description: |
    Intake that produces the five shared company-context/ files every
    v2 agent reads on activation. Run once at project start;
    re-runnable as a refresh. Can also import & adapt an existing
    project's context instead of starting from scratch.

phases:
  - id: source
    name: "Source selection"
    description: "Start from scratch, or import & adapt an existing context folder."
    steps:
      - id: choose-mode
        name: "Choose bootstrap mode"
        agent: marketing-orchestrator
        action: |
          Ask the user how they want to bootstrap:
          - SCRATCH: answer intake questions for each file (default).
          - IMPORT:  seed from another project's company-context, then
                     adapt each file for this project.

          If SCRATCH, set every file's mode to `fresh` and proceed to
          the icp phase. If IMPORT, continue with the steps below.
        output: "(no file — sets per-file mode: fresh | import)"
        gate: "user_approval"

      - id: resolve-source
        name: "Resolve the source folder"
        agent: marketing-orchestrator
        condition: "mode == IMPORT"
        action: |
          Ask for a folder path, then resolve it (tolerant, never guess
          content):
          - If the path DIRECTLY contains any recognized context file
            (icp.md, positioning.md, brand-voice.md, kpis.md,
            tech-stack.md), use it as the source folder.
          - Else look for `_bmad-output/company-context/` then
            `company-context/` directly beneath it; use the first that
            contains recognized files.
          - Else treat the path as a CONTAINER: scan its immediate
            subfolders for any that resolve (by the two rules above) to
            a context folder. If two or more source projects are found,
            list them and ask the user to choose exactly one.
          - If nothing resolves, tell the user no context files were
            found at that path and offer to switch to SCRATCH.

          Do not read files outside the path the user gave.
        output: "(no file — sets {source_folder})"
        gate: "user_approval"

      - id: select-files
        name: "Report availability and select files"
        agent: marketing-orchestrator
        condition: "mode == IMPORT and {source_folder} resolved"
        action: |
          Scan {source_folder} for the five recognized files. Report:
          - present: which recognized files exist.
          - missing: which recognized files are absent.
          Ignore unrecognized files (e.g. bootstrap-summary.md, notes).

          Ask the user to include or exclude each PRESENT file
          individually. For each MISSING file, ask: run the from-scratch
          intake for it, or skip it.

          Record per-file mode: `import` (present + included),
          `fresh` (missing + run intake), or `skip`.
        output: "(no file — finalizes per-file mode map)"
        gate: "user_approval"

      - id: copy-and-adapt
        name: "Copy then adapt included files"
        agent: marketing-orchestrator
        condition: "any file mode == import"
        action: |
          For each file marked `import`, in this order — icp.md,
          positioning.md, brand-voice.md, kpis.md, tech-stack.md:

          1. Read the source file from {source_folder}.
          2. If a file with the same name already exists under
             {output_folder}/company-context/, show existing vs incoming
             and ask keep / overwrite before writing. On `keep`, set the
             file's mode to `skip` and move on.
          3. Copy the body into {output_folder}/company-context/.
             Refresh frontmatter: preserve `owner` and `schema_version`;
             set `last_updated` to today and `last_updated_by: user`.
             Set the Status line to `In progress`.
          4. Adapt the imported draft for THIS project. Walk the
             project-specific fields (company name, segments, named
             references, numbers, vendor names) one focused question at
             a time. Apply Source Fidelity: never carry a number from the
             source project as if it were this project's — confirm or
             replace each; on missing data, ask, don't fill.
          5. On the user's approval, set Status to `Bootstrapped`.

          Files marked `skip` are left untouched. Files marked `fresh`
          are handled by their intake phase below.
        output: "(writes the imported+adapted company-context files)"
        gate: "user_approval"

  - id: icp
    name: "ICP intake"
    description: "Capture the Ideal Customer Profile."
    steps:
      - id: icp-intake
        name: "Ideal Customer Profile"
        agent: marketing-orchestrator
        condition: "icp.md mode == fresh"
        action: |
          If icp.md was imported & adapted in the source phase, skip this
          step. Otherwise ask the user, one focused question at a time:
          - Primary segment(s): industry, company size, geo.
          - Buyer persona(s): title, seniority, team.
          - Jobs-to-be-done: what they're hired to accomplish.
          - Top three pains the product addresses.
          - Triggers that cause them to look for a solution.
          - Anti-personas: who is explicitly NOT a fit.
        output: "icp.md"
        gate: "user_approval"

  - id: positioning
    name: "Positioning intake"
    description: "Capture category, target, value pyramid."
    steps:
      - id: positioning-intake
        name: "Positioning statement"
        agent: marketing-orchestrator
        condition: "positioning.md mode == fresh"
        action: |
          If positioning.md was imported & adapted in the source phase,
          skip this step. Otherwise walk the user through the classic
          positioning template:
          - For (target) who (need),
          - (product) is a (category)
          - that (key benefit)
          - unlike (primary alternatives),
          - because (reason to believe).
          Then build a 3-tier value pyramid (functional / emotional /
          social) and three messaging pillars. Do not invent
          competitive claims; ask for sources.
        output: "positioning.md"
        gate: "user_approval"

  - id: brand-voice
    name: "Brand voice intake"
    description: "Capture voice attributes and tone."
    steps:
      - id: brand-voice-intake
        name: "Brand voice"
        agent: marketing-orchestrator
        condition: "brand-voice.md mode == fresh"
        action: |
          If brand-voice.md was imported & adapted in the source phase,
          skip this step. Otherwise capture:
          - Three to five voice attributes (e.g. "expert", "wry",
            "concrete"), each with a one-line definition.
          - Do/don't word lists (10–20 each).
          - Three sample snippets in voice (one tweet, one headline,
            one paragraph).
          - Tone modulation rules (e.g. "more formal in PR; more
            casual in onboarding emails").
        output: "brand-voice.md"
        gate: "user_approval"

  - id: kpis
    name: "KPIs intake (minimal)"
    description: "Capture the 3-5 KPIs the company is run by — names + definitions only."
    steps:
      - id: kpis-intake
        name: "KPIs"
        agent: marketing-orchestrator
        condition: "kpis.md mode == fresh"
        action: |
          If kpis.md was imported & adapted in the source phase, skip
          this step. Otherwise capture only the durable shape:
          - The 3-5 metrics this company is actually run by (the ones
            the CEO would name in a board meeting).
          - For each: a one-line operational definition (formula or
            unambiguous prose).

          Do NOT capture in bootstrap — these rot too fast or are
          re-captured downstream where they belong:
          - Current values → live dashboard (Pixel's DB capability).
          - Targets and time horizons → annual plan and quarterly
            re-plan (Max Growth's AP capability).
          - Dashboard URLs / source systems → dashboard spec.
          - Per-KPI owners → omit; the company-context schema already
            records `owner` in frontmatter for the file itself
            (growth-analyst).

          Cap at 5. If the user lists more, ask which 5 they'd put on
          the board deck.
        output: "kpis.md"
        gate: "user_approval"

  - id: tech-stack
    name: "Tech stack intake (vendor names only)"
    description: "Capture the vendor names of the core MarTech categories."
    steps:
      - id: tech-stack-intake
        name: "Tech stack"
        agent: marketing-orchestrator
        condition: "tech-stack.md mode == fresh"
        action: |
          If tech-stack.md was imported & adapted in the source phase,
          skip this step. Otherwise capture vendor name only — one line
          per category. Use "none" if the user doesn't have one.
          - MAP             (HubSpot / Marketo / Pardot / none)
          - CRM             (Salesforce / HubSpot / Pipedrive / none)
          - Web analytics   (GA4 / Mixpanel / Amplitude / Plausible)
          - CMS             (WordPress / Webflow / Sanity / custom)
          - Tag manager     (GTM / Segment / none)
          - Experimentation (Optimizely / VWO / Statsig / none)
          - Ad platforms    (named list: Google Ads, LinkedIn, Meta…)

          Do NOT capture in bootstrap — these rot fast and belong in
          deliverables, not intake:
          - Lead-routing rules, SLAs       → marops-audit.
          - Scoring model inputs/weights   → Pixel SC + Mark Auto SC.
          - Identity resolution approach   → marops-audit.
          - Integration gaps / pain points → marops-audit.
          - Vendor versions, contract URLs → irrelevant.

          The downstream test for "do we need this in bootstrap?": can
          one of {paid search, MAP spec, experimentation, SEO, MarOps
          audit} read the line and proceed? If not, omit.
        output: "tech-stack.md"
        gate: "user_approval"

  - id: handoff
    name: "Handoff"
    description: "Confirm files written and orient the user."
    steps:
      - id: summary
        name: "Summary"
        agent: marketing-orchestrator
        action: |
          List the five files written under
          {output_folder}/company-context/ with a one-line summary of
          each. Tell the user which agents to invoke next based on
          their stated priority (refer to module.yaml::agents for the
          full roster). Suggest running /marketing-orchestrator (Max
          Growth) to plan first moves.
        output: "bootstrap-summary.md"
