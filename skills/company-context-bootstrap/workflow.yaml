# Company Context Bootstrap Workflow
# Trigger: WB
# Lead: Max Growth (Marketing Orchestrator)
# Description: Intake / import / migrate / ingest → an OKF company-context/ bundle.

workflow:
  id: company-context-bootstrap
  name: "Company Context Bootstrap"
  version: "1.2.0"
  trigger: "WB"
  lead_agent: marketing-orchestrator
  description: |
    Produces and maintains the shared company-context/ OKF bundle every
    v2 agent reads on activation. Four modes:
    - scratch: answer intake questions for each core file.
    - import:  seed from another project's context, then adapt.
    - migrate: upgrade an existing non-OKF company-context/ in place to
               the OKF bundle format (one-time).
    - ingest:  refactor the input/ folder into OKF concepts and fold new
               knowledge into the bundle (run anytime).
    Scratch/import run once at project start; migrate is a one-time
    upgrade; ingest runs anytime.

# Shared OKF conventions referenced by every phase that writes a file.
# {output_folder}/company-context/ IS a Google Open Knowledge Format
# (OKF) v0.1 bundle: a directory of Markdown concept files the agents
# reason from. Keep this block and docs/company-context.md in lock-step.
okf_conventions: |
  The folder {output_folder}/company-context/ IS an OKF v0.1 bundle.
  Every concept file is Markdown with this frontmatter (OKF fields +
  retained BMAD fields). OKF requires only `type`; keep the BMAD fields
  too — the agents and the single-writer rule depend on them:

    ---
    type: <OKF concept type>     # e.g. ICP, Positioning, Brand Voice,
                                 #   KPI Set, Tech Stack, Persona, Metric,
                                 #   Competitor, System, Reference
    title: <human-readable name>
    description: <one sentence>
    tags: [company-context, <more>]
    timestamp: <ISO 8601>        # mirrors last_updated, OKF-queryable
    resource: <URI>              # optional; omit if none
    owner: <agent-code>          # BMAD — one owner; only the owner writes
    last_updated: YYYY-MM-DD
    last_updated_by: <agent-code-or-user>
    schema_version: 2
    ---
    Status: <Bootstrapped|In progress|Stable|Stale (needs refresh)>

  Then the free-form Markdown body. Conventions:
  - Concept identity is the file path minus `.md`.
  - Link concepts with absolute, bundle-relative Markdown links, e.g.
    `[CTO buyer](/personas/cto-buyer.md)`. Consumers tolerate broken
    links, so linking forward to a not-yet-written concept is fine.
  - Granularity is HYBRID: the five core files (icp.md, positioning.md,
    brand-voice.md, kpis.md, tech-stack.md) ALWAYS stay at their paths as
    hub concepts. Explode a sub-item into its own concept only when it
    earns one — e.g. >= 2 distinct buyer personas -> personas/<slug>.md
    (icp.md keeps a summary + links down), a KPI with a real definition
    or citations -> metrics/<slug>.md, ingested competitors/systems/
    sources -> their folders. An exploded hub keeps a short summary and
    links down.
  - Sub-concepts INHERIT their owner from the parent hub: personas/* and
    positioning's competitors/* -> product-marketing-orchestrator;
    metrics/* -> growth-analyst; systems/* -> marketing-automation-
    engineer; sources/* -> last_updated_by: user (ingest).
  - Reserved files (never used as concept docs):
    * index.md — progressive disclosure. The ROOT index.md is the only
      file allowed frontmatter, and only `okf_version: "0.1"`. Body is
      grouped sections of `* [Title](/path) - description`. Subfolder
      index.md files carry no frontmatter.
    * log.md — bundle-root change history, newest first: `## YYYY-MM-DD`
      headings then `* **Creation**: …` / `* **Update**: …` /
      `* **Migration**: …` / `* **Ingest**: …`.
  - Apply Source Fidelity (see SKILL.md) to every number, in every mode.

phases:
  - id: source
    name: "Source selection"
    description: "Pick a mode: scratch, import & adapt, migrate to OKF, or ingest the input folder."
    steps:
      - id: choose-mode
        name: "Choose bootstrap mode"
        agent: marketing-orchestrator
        action: |
          Ask the user which mode to run:
          - SCRATCH: answer intake questions for each core file (default).
          - IMPORT:  seed from another project's company-context, then
                     adapt each file for this project.
          - MIGRATE: upgrade an existing non-OKF company-context/ in place
                     to the OKF bundle format (one-time).
          - INGEST:  read the input/ folder, refactor its files into OKF
                     concepts, and fold new knowledge into the bundle
                     (run anytime).

          Route:
          - SCRATCH -> set every core file's mode to `fresh`; run the
            icp…tech-stack intake phases, then handoff.
          - IMPORT  -> continue with resolve-source … copy-and-adapt
            below, then the intake phases for any non-imported file, then
            handoff.
          - MIGRATE -> skip to the `migrate` phase; skip all intake.
          - INGEST  -> skip to the `ingest` phase; skip all intake.

          All four modes finish in the handoff phase, which writes/
          refreshes the bundle's root index.md and log.md.
        output: "(no file — sets mode and per-file modes)"
        gate: "user_approval"

      - id: resolve-source
        name: "Resolve the source folder"
        agent: marketing-orchestrator
        condition: "mode == IMPORT"
        action: |
          Ask for a folder path, then resolve it (tolerant, never guess
          content):
          - If the path DIRECTLY contains any recognized context file
            (icp.md, positioning.md, brand-voice.md, kpis.md,
            tech-stack.md), use it as the source folder.
          - Else look for `_bmad-output/company-context/` then
            `company-context/` directly beneath it; use the first that
            contains recognized files.
          - Else treat the path as a CONTAINER: scan its immediate
            subfolders for any that resolve (by the two rules above) to
            a context folder. If two or more source projects are found,
            list them and ask the user to choose exactly one.
          - If nothing resolves, tell the user no context files were
            found at that path and offer to switch to SCRATCH.

          Do not read files outside the path the user gave.
        output: "(no file — sets {source_folder})"
        gate: "user_approval"

      - id: select-files
        name: "Report availability and select files"
        agent: marketing-orchestrator
        condition: "mode == IMPORT and {source_folder} resolved"
        action: |
          Scan {source_folder} for the five recognized files. Report:
          - present: which recognized files exist.
          - missing: which recognized files are absent.
          Ignore unrecognized files (e.g. bootstrap-summary.md, notes).

          Ask the user to include or exclude each PRESENT file
          individually. For each MISSING file, ask: run the from-scratch
          intake for it, or skip it.

          Record per-file mode: `import` (present + included),
          `fresh` (missing + run intake), or `skip`.
        output: "(no file — finalizes per-file mode map)"
        gate: "user_approval"

      - id: copy-and-adapt
        name: "Copy then adapt included files"
        agent: marketing-orchestrator
        condition: "any file mode == import"
        action: |
          For each file marked `import`, in this order — icp.md,
          positioning.md, brand-voice.md, kpis.md, tech-stack.md:

          1. Read the source file from {source_folder}.
          2. If a file with the same name already exists under
             {output_folder}/company-context/, show existing vs incoming
             and ask keep / overwrite before writing. On `keep`, set the
             file's mode to `skip` and move on.
          3. Copy the body into {output_folder}/company-context/ as an
             OKF concept (see okf_conventions). Preserve `owner`; UPGRADE
             the frontmatter to schema_version 2 — add the OKF fields
             (`type`, `title`, `description`, `tags`, `timestamp`, and
             `resource` if one applies); set `last_updated` to today and
             `last_updated_by: user`. Set the Status line to `In progress`.
          4. Adapt the imported draft for THIS project. Walk the
             project-specific fields (company name, segments, named
             references, numbers, vendor names) one focused question at
             a time. Apply Source Fidelity: never carry a number from the
             source project as if it were this project's — confirm or
             replace each; on missing data, ask, don't fill.
          5. On the user's approval, set Status to `Bootstrapped`.

          Files marked `skip` are left untouched. Files marked `fresh`
          are handled by their intake phase below.
        output: "(writes the imported+adapted company-context files)"
        gate: "user_approval"

  - id: icp
    name: "ICP intake"
    description: "Capture the Ideal Customer Profile."
    steps:
      - id: icp-intake
        name: "Ideal Customer Profile"
        agent: marketing-orchestrator
        condition: "icp.md mode == fresh"
        action: |
          If icp.md was imported & adapted in the source phase, skip this
          step. Otherwise ask the user, one focused question at a time:
          - Primary segment(s): industry, company size, geo.
          - Buyer persona(s): title, seniority, team.
          - Jobs-to-be-done: what they're hired to accomplish.
          - Top three pains the product addresses.
          - Triggers that cause them to look for a solution.
          - Anti-personas: who is explicitly NOT a fit.

          Write icp.md as an OKF concept (see okf_conventions) with
          `type: ICP`, owner product-marketing-orchestrator. HYBRID
          explode: if the user names two or more distinct buyer personas,
          create personas/<slug>.md for each (`type: Persona`, owner
          inherited: product-marketing-orchestrator) and keep a one-line
          summary + an absolute link to each in icp.md; otherwise keep
          personas inline.
        output: "icp.md"
        gate: "user_approval"

  - id: positioning
    name: "Positioning intake"
    description: "Capture category, target, value pyramid."
    steps:
      - id: positioning-intake
        name: "Positioning statement"
        agent: marketing-orchestrator
        condition: "positioning.md mode == fresh"
        action: |
          If positioning.md was imported & adapted in the source phase,
          skip this step. Otherwise walk the user through the classic
          positioning template:
          - For (target) who (need),
          - (product) is a (category)
          - that (key benefit)
          - unlike (primary alternatives),
          - because (reason to believe).
          Then build a 3-tier value pyramid (functional / emotional /
          social) and three messaging pillars. Do not invent
          competitive claims; ask for sources.

          Write positioning.md as an OKF concept (see okf_conventions)
          with `type: Positioning`, owner product-marketing-orchestrator.
          Link to any competitors/<slug>.md concepts that exist.
        output: "positioning.md"
        gate: "user_approval"

  - id: brand-voice
    name: "Brand voice intake"
    description: "Capture voice attributes and tone."
    steps:
      - id: brand-voice-intake
        name: "Brand voice"
        agent: marketing-orchestrator
        condition: "brand-voice.md mode == fresh"
        action: |
          If brand-voice.md was imported & adapted in the source phase,
          skip this step. Otherwise capture:
          - Three to five voice attributes (e.g. "expert", "wry",
            "concrete"), each with a one-line definition.
          - Do/don't word lists (10–20 each).
          - Three sample snippets in voice (one tweet, one headline,
            one paragraph).
          - Tone modulation rules (e.g. "more formal in PR; more
            casual in onboarding emails").

          Write brand-voice.md as an OKF concept (see okf_conventions)
          with `type: Brand Voice`, owner brand-orchestrator.
        output: "brand-voice.md"
        gate: "user_approval"

  - id: kpis
    name: "KPIs intake (minimal)"
    description: "Capture the 3-5 KPIs the company is run by — names + definitions only."
    steps:
      - id: kpis-intake
        name: "KPIs"
        agent: marketing-orchestrator
        condition: "kpis.md mode == fresh"
        action: |
          If kpis.md was imported & adapted in the source phase, skip
          this step. Otherwise capture only the durable shape:
          - The 3-5 metrics this company is actually run by (the ones
            the CEO would name in a board meeting).
          - For each: a one-line operational definition (formula or
            unambiguous prose).

          Do NOT capture in bootstrap — these rot too fast or are
          re-captured downstream where they belong:
          - Current values → live dashboard (Pixel's DB capability).
          - Targets and time horizons → annual plan and quarterly
            re-plan (Max Growth's AP capability).
          - Dashboard URLs / source systems → dashboard spec.
          - Per-KPI owners → omit; the company-context schema already
            records `owner` in frontmatter for the file itself
            (growth-analyst).

          Cap at 5. If the user lists more, ask which 5 they'd put on
          the board deck.

          Write kpis.md as an OKF concept (see okf_conventions) with
          `type: KPI Set`, owner growth-analyst. HYBRID explode: if a KPI
          has a real definition or citations worth its own concept,
          create metrics/<slug>.md (`type: Metric`, owner inherited:
          growth-analyst) and link it from kpis.md.
        output: "kpis.md"
        gate: "user_approval"

  - id: tech-stack
    name: "Tech stack intake (vendor names only)"
    description: "Capture the vendor names of the core MarTech categories."
    steps:
      - id: tech-stack-intake
        name: "Tech stack"
        agent: marketing-orchestrator
        condition: "tech-stack.md mode == fresh"
        action: |
          If tech-stack.md was imported & adapted in the source phase,
          skip this step. Otherwise capture vendor name only — one line
          per category. Use "none" if the user doesn't have one.
          - MAP             (HubSpot / Marketo / Pardot / none)
          - CRM             (Salesforce / HubSpot / Pipedrive / none)
          - Web analytics   (GA4 / Mixpanel / Amplitude / Plausible)
          - CMS             (WordPress / Webflow / Sanity / custom)
          - Tag manager     (GTM / Segment / none)
          - Experimentation (Optimizely / VWO / Statsig / none)
          - Ad platforms    (named list: Google Ads, LinkedIn, Meta…)

          Do NOT capture in bootstrap — these rot fast and belong in
          deliverables, not intake:
          - Lead-routing rules, SLAs       → marops-audit.
          - Scoring model inputs/weights   → Pixel SC + Mark Auto SC.
          - Identity resolution approach   → marops-audit.
          - Integration gaps / pain points → marops-audit.
          - Vendor versions, contract URLs → irrelevant.

          The downstream test for "do we need this in bootstrap?": can
          one of {paid search, MAP spec, experimentation, SEO, MarOps
          audit} read the line and proceed? If not, omit.

          Write tech-stack.md as an OKF concept (see okf_conventions) with
          `type: Tech Stack`, owner marketing-automation-engineer. A
          system that grows its own detail later becomes systems/<slug>.md
          (`type: System`, owner inherited).
        output: "tech-stack.md"
        gate: "user_approval"

  - id: migrate
    name: "Migrate existing context to OKF"
    description: "Upgrade an existing non-OKF company-context/ in place to the OKF bundle format."
    steps:
      - id: migrate-scan
        name: "Scan and report"
        agent: marketing-orchestrator
        condition: "mode == MIGRATE"
        action: |
          Scan {output_folder}/company-context/ for existing files.
          Report which core files are present and whether each is already
          OKF (has a non-empty `type` in frontmatter) or legacy
          (schema_version 1 / no `type`). If the folder is missing or
          empty, say so and offer to switch to SCRATCH. Do not write yet.
        output: "(no file — inventory of existing files)"
        gate: "user_approval"

      - id: migrate-upgrade
        name: "Upgrade each file in place"
        agent: marketing-orchestrator
        condition: "mode == MIGRATE"
        action: |
          For each legacy file, upgrade it in place to an OKF concept
          (see okf_conventions) WITHOUT rewriting its substance:
          1. Derive `type` from the file (icp.md→ICP, positioning.md→
             Positioning, brand-voice.md→Brand Voice, kpis.md→KPI Set,
             tech-stack.md→Tech Stack; any other file → a descriptive
             type). Derive `title`/`description` from the existing heading
             or first line; set `tags` and `timestamp` (today, ISO 8601).
          2. PRESERVE `owner` and the Status line exactly. Bump
             `schema_version` to 2. Keep `last_updated`/`last_updated_by`
             unless the user is the one running this, in which case set
             `last_updated` today and `last_updated_by: user`.
          3. Show existing vs upgraded frontmatter and ask
             keep / overwrite before writing each file. Never change the
             body content during migration.
          4. Offer to explode where the Hybrid heuristic warrants it
             (e.g. multiple personas already listed in icp.md) — ask
             before creating any personas/ or metrics/ files; link them
             back from the hub.

          Only ever write under {output_folder}/company-context/.
        output: "(upgrades existing company-context files in place)"
        gate: "user_approval"

  - id: ingest
    name: "Ingest the input folder"
    description: "Refactor files dropped in input/ into OKF concepts and fold new knowledge into the bundle."
    steps:
      - id: ingest-resolve
        name: "Locate and enumerate input"
        agent: marketing-orchestrator
        condition: "mode == INGEST"
        action: |
          Resolve the input folder: use config
          `marketing-growth.input_folder` if set, else
          {project-root}/input/. If it is missing or empty, tell the user
          where it looked and stop (offer another mode). Otherwise list
          every file found (recurse one level), with type and size, and
          confirm the set to ingest. Read nothing outside this folder.
        output: "(no file — list of input files)"
        gate: "user_approval"

      - id: ingest-refactor
        name: "Refactor each input into OKF concepts"
        agent: marketing-orchestrator
        condition: "mode == INGEST"
        action: |
          For each confirmed input file, in user-approved order:
          1. Read it (the Read tool handles PDF, DOCX, images, and
             notebooks; read text / markdown / CSV / HTML directly).
          2. Draft one or more OKF concept docs (see okf_conventions)
             under {output_folder}/company-context/sources/, choosing a
             descriptive `type` (Reference, Research, Persona, Competitor,
             Transcript, …). Set `resource` to the original input path,
             `timestamp` today, `last_updated_by: user`. Cross-link each
             new concept to the relevant core hub(s) with absolute links,
             and add a back-link from the hub when it aids navigation.
          3. Summarize what each source asserts. Apply Source Fidelity:
             carry numbers only as the source states them, cited; never
             promote a source's figure into a core file without the
             user's confirmation.

          Show the planned sources/ files before writing; gate on
          approval. Leave the original input files untouched.
        output: "(writes sources/ concept files)"
        gate: "user_approval"

      - id: ingest-fold
        name: "Propose core updates"
        agent: marketing-orchestrator
        condition: "mode == INGEST"
        action: |
          Where an ingested source bears on one of the five core files
          (a new persona, a positioning shift, a new KPI, a new system),
          propose a gated edit to THAT file's OWNER concept:
          - Draft the change, show a before/after diff, and confirm every
            number with the user (Source Fidelity).
          - Respect the single-writer rule: edits land in the owner file
            only; name which owner agent the change belongs to.
          - Apply only on approval; on decline, leave the core file as is
            (the knowledge still lives in its sources/ concept).
          Bump the edited file's `last_updated`/`timestamp`.
        output: "(optional gated edits to core owner files)"
        gate: "user_approval"

  - id: handoff
    name: "Bundle refresh and handoff"
    description: "Write/refresh the OKF index + log, refresh the project AGENTS.md OKF block, confirm what changed, and orient the user."
    steps:
      - id: bundle-index
        name: "Refresh index.md and log.md"
        agent: marketing-orchestrator
        action: |
          Regenerate {output_folder}/company-context/index.md as the OKF
          bundle root (frontmatter: only `okf_version: "0.1"`). Group the
          entries: a "Core concepts" section (the five hubs), then a
          section per subfolder that exists (personas/, metrics/,
          competitors/, systems/, sources/); each entry is
          `* [Title](/path) - description` using the concept's own
          description. Create a frontmatter-less index.md inside any
          populated subfolder.

          Append to {output_folder}/company-context/log.md (create if
          absent) a dated entry, newest first, recording what this run
          did: **Creation** for scratch/import, **Migration** for migrate,
          **Ingest** (one line per source) for ingest, and **Update** for
          any core-file edits.
        output: "index.md, log.md"
        gate: "user_approval"

      - id: ensure-agents-file
        name: "Refresh the project AGENTS.md OKF block"
        agent: marketing-orchestrator
        action: |
          Ensure {project-root}/AGENTS.md carries the marketing-growth OKF
          briefing-mandate block. Read the exact block from the sibling
          `templates/agents-okf-block.md` in this skill's folder — it is
          delimited by `<!-- marketing-growth:okf start -->` and
          `<!-- marketing-growth:okf end -->`. Inject it idempotently:
          1. {project-root}/AGENTS.md does not exist -> create it containing
             exactly the block.
          2. It exists and already contains the marketing-growth:okf markers
             -> replace everything from the start marker through the end
             marker with the current block; leave all other content (prose,
             any `<!-- bmad-manager:bmad … -->` block) untouched.
          3. It exists without the markers -> append the block after the
             existing content (one blank line as separator), preserving
             everything already there.
          Show the user a before/after diff of AGENTS.md and gate on approval
          before writing. {project-root}/AGENTS.md and {output_folder}/ are
          the only places this workflow writes; never touch any other
          project-root file.
        output: "AGENTS.md (marketing-growth:okf block)"
        gate: "user_approval"

      - id: summary
        name: "Summary"
        agent: marketing-orchestrator
        action: |
          List what now exists under {output_folder}/company-context/:
          the five core concepts, any sub-concept folders, and the
          index.md / log.md, plus the refreshed marketing-growth:okf block
          in {project-root}/AGENTS.md. Note the bundle is OKF v0.1 —
          portable, and viewable in Google's reference OKF HTML visualizer.
          Tell the
          user which agents to invoke next based on their stated priority
          (refer to module.yaml::agents for the full roster). Suggest
          running /marketing-orchestrator (Max Growth) to plan first moves.
        output: "bootstrap-summary.md"
