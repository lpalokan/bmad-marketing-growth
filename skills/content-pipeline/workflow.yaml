# Content Pipeline Workflow
# Trigger: WC
# Lead: Milo Page (Content Marketing Lead)
# Description: Brief → Writing → Publication → Monitoring content workflow.
# v2 refresh: agent refs updated, brief_template fields added.

workflow:
  id: content-pipeline
  name: "Content Pipeline"
  version: "2.0.0"
  trigger: "WC"
  lead_agent: content-architect
  description: |
    End-to-end content creation workflow from brief to publication.
    Manages the full content lifecycle with quality gates. v2 uses
    content-seo-strategist (renamed from seo-strategist) and pulls
    distribution through Nova (Field).

phases:
  - id: brief
    name: "Content Brief"
    description: "Define content requirements and specifications."
    steps:
      - id: content-request
        name: "Content Request Intake"
        agent: content-architect
        action: |
          Gather from user:
          - Content type (blog, guide, case study, etc.)
          - Target topic/keyword
          - Target audience (named ICP segment from `icp.md`)
          - Business objective
          - Desired length
          - Deadline
        output: "content-request.md"

      - id: keyword-research
        name: "Keyword & Topic Research"
        agent: content-architect
        delegates_to: content-seo-strategist
        action: |
          Commission content-SEO research: primary keyword, secondary
          keywords, search intent, competitor content analysis,
          content gap opportunities.
        brief_template: "brief-templates/01-keyword-research.md"
        output: "keyword-research.md"

      - id: content-brief
        name: "Create Content Brief"
        agent: content-architect
        action: |
          Use capability CB (content brief): headline options (5),
          target keyword and semantics, content outline (H2s, H3s),
          key points to cover, internal/external link suggestions,
          CTA strategy, word-count target, tone and style notes.
        output: "content-brief.md"

      - id: brief-approval
        name: "Brief Approval"
        agent: content-architect
        action: |
          Present brief to user: review headlines, validate outline,
          confirm direction, get approval to proceed.
        gate: "user_approval"

  - id: creation
    name: "Content Creation"
    description: "Write and refine content."
    steps:
      - id: first-draft
        name: "First Draft"
        agent: content-architect
        action: |
          Write content following the approved brief. Brand voice
          per `brand-voice.md`. Numbers sourced or marked `[needs
          source]`.
        output: "draft-v1.md"

      - id: seo-optimization
        name: "Content SEO Optimization"
        agent: content-architect
        delegates_to: content-seo-strategist
        action: |
          Commission content-SEO optimization: meta title and
          description, header optimization, keyword usage check
          (content-side only — technical SEO is Tek Crawl's job),
          image alt text suggestions, internal linking audit.
        brief_template: "brief-templates/02-seo-optimization.md"
        output: "seo-optimizations.md"

      - id: content-revision
        name: "Content Revision"
        agent: content-architect
        action: |
          Apply SEO feedback; polish; verify accuracy; check flow.
        output: "draft-v2.md"

      - id: content-review
        name: "Content Review"
        agent: content-architect
        action: |
          Present to user for final approval.
        gate: "user_approval"
        output: "draft-final.md"

  - id: publication
    name: "Publication & Distribution"
    description: "Publish and promote content."
    steps:
      - id: publish-prep
        name: "Publication Preparation"
        agent: content-architect
        action: |
          Final formatting, image selection brief, featured image
          specs, category / tag assignment, publication date.
        output: "publish-checklist.md"

      - id: social-distribution
        name: "Social Distribution Plan"
        agent: content-architect
        delegates_to: social-media-strategist
        action: |
          Commission Nova for distribution: per-platform posts,
          schedule, engagement strategy, repurposing opportunities.
        brief_template: "brief-templates/03-social-distribution.md"
        output: "distribution-plan.md"

      - id: publication
        name: "Content Publication"
        agent: content-architect
        action: |
          Execute publication: publish content, submit to search
          console, share via approved distribution plan, notify
          stakeholders.
        output: "publication-confirmation.md"

  - id: monitoring
    name: "Performance Monitoring"
    description: "Track content performance (Pixel-validated)."
    steps:
      - id: initial-tracking
        name: "Initial Performance Check"
        agent: content-architect
        delegates_to: growth-analyst
        action: |
          Verify analytics, note baseline metrics, schedule follow-up
          review. Pixel validates the measurement.
        output: "tracking-setup.md"

      - id: performance-review
        name: "30-Day Performance Review"
        agent: growth-analyst
        trigger: "scheduled_30_days"
        action: |
          Analyze traffic, engagement, conversion, SEO ranking
          progress. Recommend optimizations.
        output: "performance-report.md"

outputs:
  primary: "draft-final.md"
  supporting:
    - "content-request.md"
    - "keyword-research.md"
    - "content-brief.md"
    - "seo-optimizations.md"
    - "distribution-plan.md"
    - "publication-confirmation.md"
    - "performance-report.md"

gates:
  - id: brief_approval
    phase: brief
    description: "User approves content brief before writing begins."
    required: true

  - id: content_approval
    phase: creation
    description: "User approves final draft before publication."
    required: true

content_types:
  - id: blog-post
    name: "Blog Post"
    word_count: "1000-2000"
    timeline: "3-5 days"

  - id: long-form-guide
    name: "Long-Form Guide"
    word_count: "3000-5000"
    timeline: "7-10 days"

  - id: case-study
    name: "Case Study"
    word_count: "1500-2500"
    timeline: "5-7 days"

  - id: landing-page
    name: "Landing Page Copy"
    word_count: "500-1000"
    timeline: "2-3 days"

  - id: email-sequence
    name: "Email Sequence"
    word_count: "200-400 per email"
    timeline: "3-5 days"

success_criteria:
  - "Content brief approved before writing"
  - "Content-SEO optimization applied"
  - "Final content approved by user"
  - "Content published successfully"
  - "Distribution executed on schedule"
  - "Performance tracking active (Pixel-validated)"
